################################################################################
################################################################################
################################################################################
services:
  ##############################################################################
  ##############################################################################
  ##############################################################################
  web:
    # https://hub.docker.com/r/makeplane/web-commercial
    image: makeplane/web-commercial:${VERSION_PLANE:-v2.6.3}
    <<:
      - *basic
      # - *basic-deploy-labels-web
    deploy:
      <<:
        - *basic-deploy
        - *basic-deploy-labels-web
      replicas: ${WEB_REPLICAS:-1}
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_PLANE_WEB:-2}
          memory: ${RESOURCES_LIMITS_MEMORY_PLANE_WEB:-500m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_PLANE_WEB:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_PLANE_WEB:-32m}
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    environment:
      <<: *web-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      default: {}
      proxy: {}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider --no-check-certificate http://127.0.0.1:3000 || exit 1",
        ]
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    # https://hub.docker.com/r/makeplane/backend-commercial
    image: makeplane/backend-commercial:${VERSION_PLANE:-v2.6.3}
    <<:
      - *basic
      # - *basic-deploy-labels-api
    deploy:
      <<:
        - *basic-deploy
        - *basic-deploy-labels-api
      replicas: ${API_REPLICAS:-1}
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_PLANE_API:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_PLANE_API:-500m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_PLANE_API:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_PLANE_API:-32m}
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    environment:
      <<:
        - *plane
        - *web-env
        - *app-env
        - *pg-env
        - *redis-env
        - *docstore-env
        # - *rustfs-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - api_logs:/code/plane/logs
    command: ./bin/docker-entrypoint-api-ee.sh
    networks:
      default: {}
      proxy: {}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider --no-check-certificate http://127.0.0.1:8000 || exit 1",
        ]
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 3

  admin:
    # https://hub.docker.com/r/makeplane/admin-commercial
    image: makeplane/admin-commercial:${VERSION_PLANE:-v2.6.3}
    <<:
      - *basic
      # - *basic-deploy-labels-admin
    deploy:
      <<:
        - *basic-deploy
        - *basic-deploy-labels-admin
      replicas: ${ADMIN_REPLICAS:-1}
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_PLANE_ADMIN:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_PLANE_ADMIN:-256m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_PLANE_ADMIN:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_PLANE_ADMIN:-32m}
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    environment:
      <<: *web-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      default: {}
      proxy: {}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider --no-check-certificate http://127.0.0.1:3000/god-mode/ || exit 1",
        ]
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 3

  space:
    # https://hub.docker.com/r/makeplane/space-commercial
    image: makeplane/space-commercial:${VERSION_PLANE:-v2.6.3}
    <<:
      - *basic
      # - *basic-deploy-labels-space
    deploy:
      <<:
        - *basic-deploy
        - *basic-deploy-labels-space
      replicas: ${SPACE_REPLICAS:-1}
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_PLANE_SPACE:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_PLANE_SPACE:-256m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_PLANE_SPACE:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_PLANE_SPACE:-32m}
    environment:
      <<: *web-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      default: {}
      proxy: {}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider --no-check-certificate http://127.0.0.1:3000/spaces/ || exit 1",
        ]
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 3

  live:
    # https://hub.docker.com/r/makeplane/live-commercial
    image: makeplane/live-commercial:${VERSION_PLANE:-v2.6.3}
    <<:
      - *basic
      # - *basic-deploy-labels-live
    deploy:
      <<:
        - *basic-deploy
        - *basic-deploy-labels-live
      replicas: ${LIVE_REPLICAS:-1}
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_PLANE_LIVE:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_PLANE_LIVE:-256m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_PLANE_LIVE:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_PLANE_LIVE:-32m}
    environment:
      <<:
        - *web-env
        - *live-env
        - *redis-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      default: {}
      proxy: {}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider --no-check-certificate http://127.0.0.1:3000/live/health || exit 1",
        ]
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    # https://hub.docker.com/r/makeplane/backend-commercial
    image: makeplane/backend-commercial:${VERSION_PLANE:-v2.6.3}
    <<: *basic
    deploy:
      <<: *basic-deploy
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_PLANE_WORKER:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_PLANE_WORKER:-2g}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_PLANE_WORKER:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_PLANE_WORKER:-32m}
      replicas: ${WORKER_REPLICAS:-1}
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    environment:
      <<:
        - *plane
        - *app-env
        - *pg-env
        - *redis-env
        - *docstore-env
        # - *rustfs-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - worker_logs:/code/plane/logs
    command: ./bin/docker-entrypoint-worker.sh

  beat-worker:
    # https://hub.docker.com/r/makeplane/backend-commercial
    image: makeplane/backend-commercial:${VERSION_PLANE:-v2.6.3}
    <<: *basic
    deploy:
      <<: *basic-deploy
      replicas: ${BEAT_WORKER_REPLICAS:-1}
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_PLANE_BEAT:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_PLANE_BEAT:-500m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_PLANE_BEAT:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_PLANE_BEAT:-32m}
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    environment:
      <<:
        - *plane
        - *app-env
        - *pg-env
        - *redis-env
        - *docstore-env
        # - *rustfs-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - beat_worker_logs:/code/plane/logs
    command: ./bin/docker-entrypoint-beat.sh

  monitor:
    # https://hub.docker.com/r/makeplane/monitor-commercial
    image: makeplane/monitor-commercial:${VERSION_PLANE:-v2.6.3}
    <<: *basic
    deploy:
      <<: *basic-deploy
      replicas: ${MONITOR_REPLICAS:-1}
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_PLANE_MONITOR:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_PLANE_MONITOR:-500m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_PLANE_MONITOR:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_PLANE_MONITOR:-32m}
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    environment:
      <<:
        - *plane
        - *monitor-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - monitor_data:/app

  silo:
    # https://hub.docker.com/r/makeplane/silo-commercial
    image: makeplane/silo-commercial:${VERSION_PLANE:-v2.6.3}
    <<:
      - *basic
      # - *basic-deploy-labels-silo
    deploy:
      <<:
        - *basic-deploy
        - *basic-deploy-labels-silo
      replicas: ${SILO_REPLICAS:-1}
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_PLANE_SILO:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_PLANE_SILO:-500m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_PLANE_SILO:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_PLANE_SILO:-32m}
    environment:
      <<:
        - *silo-env
        - *app-env
        - *pg-env
        - *redis-env
        - *docstore-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      default: {}
      proxy: {}

  automation-consumer:
    # https://hub.docker.com/r/makeplane/backend-commercial
    image: makeplane/backend-commercial:${VERSION_PLANE:-v2.6.3}
    <<: *basic
    deploy:
      <<: *basic-deploy
      replicas: ${AUTOMATION_CONSUMER_REPLICAS:-1}
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_PLANE_AUTOMATION_CONSUMER:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_PLANE_AUTOMATION_CONSUMER:-500m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_PLANE_AUTOMATION_CONSUMER:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_PLANE_AUTOMATION_CONSUMER:-32m}
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    environment:
      <<:
        - *plane
        - *app-env
        - *pg-env
        - *redis-env
        - *automation-consumer-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    command: ./bin/docker-entrypoint-automation-consumer.sh

  outbox-poller:
    # https://hub.docker.com/r/makeplane/backend-commercial
    image: makeplane/backend-commercial:${VERSION_PLANE:-v2.6.3}
    <<: *basic
    deploy:
      <<: *basic-deploy
      replicas: ${OUTBOX_POLLER_REPLICAS:-1}
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_PLANE_OUTBOX_POLLER:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_PLANE_OUTBOX_POLLER:-500m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_PLANE_OUTBOX_POLLER:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_PLANE_OUTBOX_POLLER:-32m}
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    environment:
      <<:
        - *plane
        - *app-env
        - *pg-env
        - *redis-env
        - *outbox-poller-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    command: ./bin/docker-entrypoint-outbox-poller.sh

  ##############################################################################
  ##############################################################################
  ##############################################################################
  migrator:
    # https://hub.docker.com/r/makeplane/backend-commercial
    image: makeplane/backend-commercial:${VERSION_PLANE:-v2.6.3}
    <<: *basic
    deploy:
      <<: *basic-deploy
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_PLANE_MIGRATOR:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_PLANE_MIGRATOR:-500m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_PLANE_MIGRATOR:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_PLANE_MIGRATOR:-32m}
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    environment:
      <<:
        - *plane
        - *app-env
        - *pg-env
        - *redis-env
        - *docstore-env
        # - *rustfs-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - migrator_logs:/code/plane/logs
    command: ./bin/docker-entrypoint-migrator.sh

  ##############################################################################
  ##############################################################################
  ##############################################################################
  plane-db:
    # https://hub.docker.com/_/postgres
    image: postgres:${VERSION_POSTGRESQL:-18.4-alpine}
    <<: *basic
    deploy:
      <<: *basic-deploy
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_POSTGRESQL:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_POSTGRESQL:-1g}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_POSTGRESQL:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_POSTGRESQL:-32m}
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_READ_SEARCH
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    environment:
      <<:
        - *pg-env
        - *base-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - postgresql_v18:/var/lib/postgresql/18/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -d $${POSTGRES_DB} -U $${POSTGRES_USER}",
        ]
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 3

  plane-mq:
    # https://hub.docker.com/_/rabbitmq
    image: rabbitmq:${VERSION_RABBITMQ:-3.13.6-management-alpine}
    <<: *basic
    deploy:
      <<: *basic-deploy
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_RABBITMQ:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_RABBITMQ:-500m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_RABBITMQ:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_RABBITMQ:-32m}
    cap_add:
      - SETGID # Allows setting group ID (`setgid`,`newgrp`,`chgrp`,`setregid()`)
      - SETUID # Allows setting user ID (`setuid`,`su`,`sudo`,`passwd`)
    environment:
      <<:
        - *mq-env
        - *base-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - rabbitmq_data:/var/lib/rabbitmq

  plane-redis:
    # https://hub.docker.com/r/valkey/valkey
    image: valkey/valkey:${VERSION_VALKEY:-9.1.0-alpine}
    <<: *basic
    deploy:
      <<: *basic-deploy
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_VALKEY:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_VALKEY:-256m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_VALKEY:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_VALKEY:-32m}
    cap_add:
      - SETGID
      - SETUID
    environment:
      <<:
        - *redis-env
        - *base-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - valkey:/data
    command: --save 300 1 --loglevel warning
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 3

  plane-rustfs:
    # https://hub.docker.com/r/rustfs/rustfs/tags
    image: rustfs/rustfs:${VERSION_RUSTFS:-1.0.0-beta.8}
    <<:
      - *basic
      # - *basic-deploy-labels-rustfs
    deploy:
      <<:
        - *basic-deploy
        - *basic-deploy-labels-rustfs
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_RUSTFS:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_RUSTFS:-1g}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_RUSTFS:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_RUSTFS:-32m}
    environment:
      <<:
        - *rustfs-env
        - *rustfs-conf-env
        - *base-env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - uploads:/data
      - rustfs_logs:/app/logs
    networks:
      default: {}
      proxy: {}
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9090/rustfs/console/health",
        ]
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 3

  # iframely:
  #   # https://hub.docker.com/r/makeplane/iframely
  #   image: makeplane/iframely:${VERSION_IFRAMELY:-v1.2.0}
  #   <<:
  #     - *basic
