  #     restart_policy:
  #       condition: on-failure
  #     resources:
  #       limits:
  #         cpus: ${RESOURCES_LIMITS_CPUS_IFRAMELY:-1}
  #         memory: ${RESOURCES_LIMITS_MEMORY_IFRAMELY:-500m}
  #       reservations:
  #         cpus: ${RESOURCES_RESERVATIONS_CPUS_IFRAMELY:-0.001}
  #         memory: ${RESOURCES_RESERVATIONS_MEMORY_IFRAMELY:-32m}
  #   volumes:
  #     - /etc/timezone:/etc/timezone:ro
  #     - /etc/localtime:/etc/localtime:ro

################################################################################
################################################################################
################################################################################
networks:
  default:
    driver: ${NETWORK_MODE:-overlay}
    attachable: true
    driver_opts:
      encrypted: "true"
  proxy:
    external: true

volumes:
  api_logs: {}
  worker_logs: {}
  beat_worker_logs: {}
  monitor_data: {}
  migrator_logs: {}
  postgresql_v18: {}
  rabbitmq_data: {}
  valkey: {}
  uploads: {}
  rustfs_logs: {}
