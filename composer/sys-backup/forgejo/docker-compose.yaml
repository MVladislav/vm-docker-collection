---
x-basic-deploy-labels: &basic-deploy-labels
  labels:
    - traefik.enable=true
    - traefik.swarm.lbswarm=${LB_SWARM:-true}
    - traefik.swarm.network=proxy
    - traefik.http.routers.forgejo.entrypoints=${TRAEFIK_ENTRYPOINT:-https}
    - traefik.http.routers.forgejo.rule=Host(`${DOMAIN?domain variable not set}`)
    - traefik.http.routers.forgejo.tls=true
    - traefik.http.routers.forgejo.tls.certresolver=${CERT_RESOLVER:-}
    - traefik.http.routers.forgejo.middlewares=${MIDDLEWARE_SECURED:-default-secured@file}
    - traefik.http.routers.forgejo.service=forgejo
    - traefik.http.services.forgejo.loadbalancer.server.scheme=${PROTOCOL:-http}
    - traefik.http.services.forgejo.loadbalancer.server.port=${PORT:-3000}

    - traefik.tcp.routers.forgejo-ssh.entrypoints=${TRAEFIK_ENTRYPOINT:-https}
    - traefik.tcp.routers.forgejo-ssh.rule=HostSNI(`${DOMAIN?domain variable not set}`)
    - traefik.tcp.routers.forgejo-ssh.tls=true
    - traefik.tcp.routers.forgejo-ssh.tls.passthrough=false
    - traefik.tcp.routers.forgejo-ssh.tls.certresolver=${CERT_RESOLVER:-}
    - traefik.tcp.routers.forgejo-ssh.middlewares=${MIDDLEWARE_SECURED_SSH:-default-whitelist}
    - traefik.tcp.routers.forgejo-ssh.service=forgejo-ssh
    - traefik.tcp.services.forgejo-ssh.loadbalancer.server.port=${PORT_SSH:-22}

x-basic-deploy: &basic-deploy
  mode: replicated
  replicas: 1
  placement:
    max_replicas_per_node: 1
    constraints:
      - "node.role==${NODE_ROLE:-manager}"
      - node.platform.os == linux
  update_config:
    order: stop-first
  restart_policy:
    condition: any
  resources:
    limits:
      cpus: ${RESOURCES_LIMITS_CPUS:-1}
      memory: ${RESOURCES_LIMITS_MEMORY:-1g}
    reservations:
      cpus: ${RESOURCES_RESERVATIONS_CPUS:-0.001}
      memory: ${RESOURCES_RESERVATIONS_MEMORY:-32m}

x-basic: &basic
  env_file: ${ENV_FILE:-.env}
  cap_add:
    - CHOWN # Allows changing file ownership (`chown`,`chgrp`)
    - FOWNER # Overrides file ownership checks (`chmod`,`kill`)
    - SETGID # Allows setting group ID (`setgid`,`newgrp`,`chgrp`,`setregid()`)
    - SETUID # Allows setting user ID (`setuid`,`su`,`sudo`,`passwd`)
  cap_drop: ["ALL"]
  security_opt:
    - no-new-privileges:true
  ulimits:
    memlock:
      soft: -1
      hard: -1
    nofile:
      soft: 655360
      hard: 655360
    fsize: -1
    as: -1
  # mem_limit: ${RESOURCES_LIMITS_MEMORY:-1g}
  networks:
    # default: {}
    proxy: {}
  healthcheck:
    disable: true
  tmpfs:
    - /tmp:rw,nosuid,nodev,noexec,relatime,size=512m
  restart: always

################################################################################
################################################################################
################################################################################
services:
  ##############################################################################
  ##############################################################################
  ##############################################################################
  forgejo:
    # https://codeberg.org/forgejo/-/packages/container/forgejo/14
    image: codeberg.org/forgejo/forgejo:${VERSION:-14}
    <<:
      - *basic
      # - *basic-deploy-labels
    deploy:
      <<:
        - *basic-deploy
        - *basic-deploy-labels
    environment:
      USER_UID: ${USER_UID:-1000}
      USER_GID: ${USER_GID:-1000}
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - data:/data
    # healthcheck:
    #   test:
    #     [
    #       "CMD-SHELL",
    #       "curl -kIf ${PROTOCOL:-http}://127.0.0.1:${PORT:-3000} > /dev/null 2>&1 || exit 1",
    #     ]
    #   start_period: 10s
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3

################################################################################
################################################################################
################################################################################
networks:
  # default:
  #   internal: true
  #   driver: ${NETWORK_MODE:-overlay}
  #   attachable: true
  #   driver_opts:
  #     encrypted: "true"
  proxy:
    external: true

volumes:
  data:
  # sudo apt install nfs-common
  data-nfs:
    driver: local
    driver_opts:
      type: nfs
      o: nfsvers=4.2,addr=${NFS_HOST?nfs host is not defined},rsize=2097152,wsize=2097152,tcp,nconnect=${NFS_NCON:-8}
      device: ":${NFS_PATH?nfs path is not defined}${SERVICE_NAME_POST:-}"
