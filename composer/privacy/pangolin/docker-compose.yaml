################################################################################
################################################################################
################################################################################
networks:
  proxy:
    name: proxy
    driver: ${NETWORK_MODE:-bridge}
    enable_ipv6: true
    attachable: true
    driver_opts:
      encrypted: "true"

volumes:
  pangolin_data: {}
  pangolin_branding: {}
  certificates: {}
  traefik_logs: {}
  crowdsec_data: {}
  crowdsec_db: {}
  maxmind: {}

configs:
  pangolin_config:
    file: ${FILE_PATH:-$PWD}/config/pangolin/config.yml
  pangolin_private_config:
    file: ${FILE_PATH:-$PWD}/config/pangolin/privateConfig.yml
  dynamic_config:
    file: ${FILE_PATH:-$PWD}/config/traefik/dynamic_config.yml
  ban_page:
    file: ${FILE_PATH:-$PWD}/config/traefik/ban.html
  acquis_config:
    file: ${FILE_PATH:-$PWD}/config/crowdsec/acquis.yaml
  appsec_config:
    file: ${FILE_PATH:-$PWD}/config/crowdsec/appsec.yaml
  traefik_config:
    file: ${FILE_PATH:-$PWD}/config/crowdsec/traefik.yaml
  syslog_config:
    file: ${FILE_PATH:-$PWD}/config/crowdsec/syslog.yaml
  journalctl_config:
    file: ${FILE_PATH:-$PWD}/config/crowdsec/journalctl.yaml

secrets:
  traefik_basicauth_secret:
    file: ${FILE_PATH:-$PWD}/config/secrets/traefik_basicauth_secret.txt
  dnschallenge_api_key_secret:
    file: ${FILE_PATH:-$PWD}/config/secrets/dnschallenge_api_key_secret.txt
  geoipupdate_account_id:
    file: ${FILE_PATH:-$PWD}/config/secrets/geoipupdate_account_id.txt
  geoipupdate_license_key:
    file: ${FILE_PATH:-$PWD}/config/secrets/geoipupdate_license_key.txt
