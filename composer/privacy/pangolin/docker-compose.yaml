---
x-basic-deploy: &basic-deploy
  mode: replicated
  replicas: 1
  placement:
    max_replicas_per_node: 1
    constraints:
      - "node.role==${NODE_ROLE:-manager}"
      - node.platform.os == linux
  update_config:
    order: stop-first
  restart_policy:
    condition: any
  resources:
    limits:
      cpus: ${RESOURCES_LIMITS_CPUS:-2}
      memory: ${RESOURCES_LIMITS_MEMORY:-1g}
    reservations:
      cpus: ${RESOURCES_RESERVATIONS_CPUS:-0.001}
      memory: ${RESOURCES_RESERVATIONS_MEMORY:-32m}

x-basic: &basic
  env_file: ${ENV_FILE:-.env}
  cap_drop: ["ALL"]
  security_opt:
    - no-new-privileges:true
  ulimits:
    memlock:
      soft: -1
      hard: -1
    nofile:
      soft: 655360
      hard: 655360
    fsize: -1
    as: -1
  healthcheck:
    disable: true
  restart: always

################################################################################
################################################################################
################################################################################
services:
  ##############################################################################
  ##############################################################################
  ##############################################################################
  pangolin:
    # https://hub.docker.com/r/fosrl/pangolin/tags
    image: fosrl/pangolin:${VERSION_PANGOLIN:-${PANGOLIN_EE:-}1.19.2}
    <<: *basic
    deploy:
      <<: *basic-deploy
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_PANGOLIN:-2}
          memory: ${RESOURCES_LIMITS_MEMORY_PANGOLIN:-2g}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_PANGOLIN:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_PANGOLIN:-32m}
    configs:
      - source: pangolin_config
        target: /app/config/config.yml
        mode: 0440
        uid: "0"
        gid: "0"
      - source: pangolin_private_config
        target: /app/config/privateConfig.yml
        mode: 0440
        uid: "0"
        gid: "0"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - pangolin_data:/app/config
      - pangolin_branding:/app/public/branding
      - maxmind:${GEOIPUPDATE_DB_DIR:-/app/geo}
      - certificates:/certificates
    environment:
      # SECRETS
      # `pangctl rotate-server-secret`
      SERVER_SECRET: ${SERVER_SECRET?SERVER_SECRET is not set}
      EMAIL_SMTP_PASS: ${EMAIL_SMTP_PASS}
      # APP
      APP_DASHBOARDURL: https://${DASHBOARDURL?domain variable not set}
      APP_BASEDOMAIN: ${BASEDOMAIN?domain variable not set}
      # DOMAINS
      DOMAINS_DEFAULT_BASEDOMAIN: ${BASEDOMAIN?base domain variable not set}
      DOMAINS_DEFAULT_CERTRESOLVER: certificates
      DOMAINS_DEFAULT_PREFERWILDCARDCERT: "true"
      # GERBIL
      GERBIL_BASEENDPOINT: ${BASEDOMAIN?base domain variable not set}
      # TRAEFIK
      GENERATE_TRAEFIK_CONFIG: "false"
      # FLAGS
      FLAGS_REQUIRE_EMAIL_VERIFICATION: ${FLAGS_REQUIRE_EMAIL_VERIFICATION:-true}
      FLAGS_DISABLE_SIGNUP_WITHOUT_INVITE: ${FLAGS_DISABLE_SIGNUP_WITHOUT_INVITE:-true}
      FLAGS_DISABLE_USER_CREATE_ORG: ${FLAGS_DISABLE_USER_CREATE_ORG:-true}
      FLAGS_ALLOW_RAW_RESOURCES: ${FLAGS_ALLOW_RAW_RESOURCES:-true}
      FLAGS_ENABLE_INTEGRATION_API: ${FLAGS_ENABLE_INTEGRATION_API:-false}
      FLAGS_DISABLE_LOCAL_SITES: ${FLAGS_DISABLE_LOCAL_SITES:-false}
      FLAGS_DISABLE_BASIC_WIREGUARD_SITES: ${FLAGS_DISABLE_BASIC_WIREGUARD_SITES:-false}
      FLAGS_DISABLE_CONFIG_MANAGED_DOMAINS: ${FLAGS_DISABLE_CONFIG_MANAGED_DOMAINS:-false}
      # DATABASE
      ENABLE_SQLITE_WAL_MODE: ${ENABLE_SQLITE_WAL_MODE:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/api/v1/"]
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      proxy: {}

  ##############################################################################
  ##############################################################################
  ##############################################################################
  gerbil:
    # https://hub.docker.com/r/fosrl/gerbil/tags
    image: fosrl/gerbil:${VERSION_GERBIL:-1.4.2}
    depends_on:
      pangolin:
        condition: service_healthy
    <<: *basic
    deploy:
      <<: *basic-deploy
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_GERBIL:-2}
          memory: ${RESOURCES_LIMITS_MEMORY_GERBIL:-512m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_GERBIL:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_GERBIL:-32m}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - target: 51820 # UDP port for WireGuard, used by Newt and WireGuard clients
        published: 51820
        protocol: udp
        mode: host
      - target: 21820 # clients
        published: 21820
        protocol: udp
        mode: host
      - target: 443 # Port for traefik because of the network_mode
        published: 443
        protocol: tcp
        mode: host
      - target: 443 # Port for traefik because of the network_mode (QUIC)
        published: 443
        protocol: udp
        mode: host
      - target: 80 # Port for traefik because of the network_mode
        published: 80
        protocol: tcp
        mode: host
      - target: 4443 # RawTCP
        published: 4443
        protocol: tcp
        mode: host
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      # - /lib/modules:/lib/modules:ro
      # - /dev/net/tun:/dev/net/tun
      - pangolin_data:/var/config
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    networks:
      proxy: {}

  ##############################################################################
  ##############################################################################
  ##############################################################################
  traefik:
    # https://hub.docker.com/_/traefik
    image: traefik:${VERSION_TRAEFIK:-v3.7.5}
    depends_on:
      pangolin:
        condition: service_healthy
      crowdsec:
        condition: service_healthy
    <<: *basic
    deploy:
      <<: *basic-deploy
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_TRAEFIK:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_TRAEFIK:-512m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_TRAEFIK:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_TRAEFIK:-32m}
    configs:
      - source: dynamic_config
        target: /etc/traefik/dynamic_config.yml
        mode: 0440
        uid: "0"
        gid: "0"
      - source: ban_page
        target: /etc/traefik/ban.html
        mode: 0440
        uid: "0"
        gid: "0"
    secrets:
      - traefik_basicauth_secret
      - dnschallenge_api_key_secret
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certificates:/certificates
      - traefik_logs:/var/log/traefik
    environment:
      # https://doc.traefik.io/traefik/reference/install-configuration/boot-environment/#environment-variables
      # https://doc.traefik.io/traefik/v2.0/reference/static-configuration/env/
      # Global configuration
      TRAEFIK_GLOBAL_CHECKNEWVERSION: ${TRAEFIK_GLOBAL_CHECKNEWVERSION:-false}
      TRAEFIK_GLOBAL_SENDANONYMOUSUSAGE: ${TRAEFIK_GLOBAL_SENDANONYMOUSUSAGE:-false}
      # EntryPoints configuration
      TRAEFIK_ENTRYPOINTS_WEB: "true"
      TRAEFIK_ENTRYPOINTS_WEB_ADDRESS: ":80"
      TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_TO: websecure
      TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_SCHEME: https
      TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_PERMANENT: "true"
      TRAEFIK_ENTRYPOINTS_WEBSECURE: "true"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS: ":443"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_TRANSPORT_RESPONDINGTIMEOUTS_READTIMEOUT: 30m
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP3: ${TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP3:-true}
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP3_ADVERTISEDPORT: 443
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_TLS_CERTRESOLVER: certificates
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_MIDDLEWARES: crowdsec@file,public-whitelist@file,default-headers@file
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_ENCODEDCHARACTERS_ALLOWENCODEDSLASH: ${ALLOWENCODEDSLASH:-true}
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_ENCODEDCHARACTERS_ALLOWENCODEDQUESTIONMARK: ${ALLOWENCODEDQUESTIONMARK:-true}
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_ENCODEDCHARACTERS_ALLOWENCODEDBACKSLASH: ${ALLOWENCODEDBACKSLASH:-false}
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_ENCODEDCHARACTERS_ALLOWENCODEDNULLCHARACTER: ${ALLOWENCODEDNULLCHARACTER:-false}
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_ENCODEDCHARACTERS_ALLOWENCODEDSEMICOLON: ${ALLOWENCODEDSEMICOLON:-false}
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_ENCODEDCHARACTERS_ALLOWENCODEDPERCENT: ${ALLOWENCODEDPERCENT:-false}
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_ENCODEDCHARACTERS_ALLOWENCODEDHASH: ${ALLOWENCODEDHASH:-false}
      TRAEFIK_ENTRYPOINTS_TCP-4443: "true"
      TRAEFIK_ENTRYPOINTS_TCP-4443_ADDRESS: ":4443/tcp"
      TRAEFIK_ENTRYPOINTS_TCP-4443_TRANSPORT_RESPONDINGTIMEOUTS_READTIMEOUT: 30m
      # Traefik logs configuration
      TRAEFIK_LOG: ${TRAEFIK_LOG:-true}
      # TRAEFIK_LOG_FILEPATH: /var/log/traefik/traefik.log
      TRAEFIK_LOG_LEVEL: INFO # TRACE, DEBUG, PANIC, FATAL, ERROR, WARN, INFO
      TRAEFIK_LOG_FORMAT: common
      # TRAEFIK_LOG_maxSize: 100
      # TRAEFIK_LOG_maxBackups: 3
      # TRAEFIK_LOG_maxAge: 3
      # TRAEFIK_LOG_COMPRESS: "true"
      # Access logs configuration
      TRAEFIK_ACCESSLOG: ${TRAEFIK_ACCESSLOG:-true}
      TRAEFIK_ACCESSLOG_FILEPATH: /var/log/traefik/access.log
      TRAEFIK_ACCESSLOG_FORMAT: common
      TRAEFIK_ACCESSLOG_FIELDS_DEFAULTMODE: keep
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_ClientUsername: drop
      TRAEFIK_ACCESSLOG_FIELDS_HEADERS_DEFAULTMODE: keep
      TRAEFIK_ACCESSLOG_FIELDS_HEADERS_NAMES_User-Agent: keep
      TRAEFIK_ACCESSLOG_FIELDS_HEADERS_NAMES_Authorization: drop
      TRAEFIK_ACCESSLOG_FIELDS_HEADERS_NAMES_Content-Type: keep
      # API and dashboard configuration
      TRAEFIK_API: ${TRAEFIK_API:-true}
      TRAEFIK_API_DASHBOARD: ${TRAEFIK_API_DASHBOARD:-false}
      TRAEFIK_API_INSECURE: "false"
      TRAEFIK_API_DEBUG: ${TRAEFIK_API_DEBUG:-false}
      # Ping configuration
      TRAEFIK_PING: "true"
      # TRAEFIK_PING_ENTRYPOINT: "web"
      # Docker configuration backend
      TRAEFIK_PROVIDERS_HTTP: "true"
      TRAEFIK_PROVIDERS_HTTP_ENDPOINT: http://pangolin:3001/api/v1/traefik-config
      TRAEFIK_PROVIDERS_HTTP_POLLINTERVAL: 5s
      # TRAEFIK_PROVIDERS_DOCKER: ${TRAEFIK_PROVIDERS_DOCKER:-false}
      # TRAEFIK_PROVIDERS_DOCKER_ENDPOINT: unix:///var/run/docker.sock
      # TRAEFIK_PROVIDERS_DOCKER_EXPOSEDBYDEFAULT: ${TRAEFIK_PROVIDERS_DOCKER_EXPOSEDBYDEFAULT:-false}
      # TRAEFIK_PROVIDERS_DOCKER_WATCH: ${TRAEFIK_PROVIDERS_DOCKER_WATCH:-false}
      TRAEFIK_PROVIDERS_FILE_FILENAME: /etc/traefik/dynamic_config.yml
      TRAEFIK_PROVIDERS_FILE_WATCH: "true"
      # TLS
      TRAEFIK_SERVERSTRANSPORT_INSECURESKIPVERIFY: "true"
      TRAEFIK_CERTIFICATESRESOLVERS_CERTIFICATES: "true"
      TRAEFIK_CERTIFICATESRESOLVERS_CERTIFICATES_ACME_EMAIL: ${CERTIFICATES_ACME_EMAIL?ACME Mail not set}
      TRAEFIK_CERTIFICATESRESOLVERS_CERTIFICATES_ACME_STORAGE: /certificates/acme.json
      TRAEFIK_CERTIFICATESRESOLVERS_CERTIFICATES_ACME_KEYTYPE: EC256
      TRAEFIK_CERTIFICATESRESOLVERS_CERTIFICATES_ACME_CERTIFICATESDURATION: ${CERTIFICATES_ACME_CERTIFICATES_DURATION:-2160} # https://doc.traefik.io/traefik/https/acme/#certificatesduration
      TRAEFIK_CERTIFICATESRESOLVERS_CERTIFICATES_ACME_CASERVER: ${CERTIFICATES_ACME_CASERVER:-https://acme-staging-v02.api.letsencrypt.org/directory} # https://acme-v02.api.letsencrypt.org/directory
      TRAEFIK_CERTIFICATESRESOLVERS_CERTIFICATES_ACME_DNSCHALLENGE: "true"
      TRAEFIK_CERTIFICATESRESOLVERS_CERTIFICATES_ACME_DNSCHALLENGE_PROVIDER: ${CERTIFICATES_ACME_DNSCHALLENGE_PROVIDER?CERTIFICATES_ACME_DNSCHALLENGE_PROVIDER is not set}
      TRAEFIK_CERTIFICATESRESOLVERS_CERTIFICATES_ACME_DNSCHALLENGE_RESOLVERS: ${CERTIFICATES_ACME_DNSCHALLENGE_RESOLVERS:-9.9.9.9,194.242.2.2,1.1.1.1}
      # TRAEFIK_CERTIFICATESRESOLVERS_CERTIFICATES_ACME_EAB_KID: ${CERTIFICATES_ACME_EAB_KID}
      # TRAEFIK_CERTIFICATESRESOLVERS_CERTIFICATES_ACME_EAB_HMACENCODED: ${CERTIFICATES_ACME_EAB_HMACENCODED}
      # PLUGINS
      TRAEFIK_EXPERIMENTAL_PLUGINS_BADGER_MODULENAME: github.com/fosrl/badger
      TRAEFIK_EXPERIMENTAL_PLUGINS_BADGER_VERSION: ${VERSION_BADGER:-v1.4.1} # https://github.com/fosrl/badger
      TRAEFIK_EXPERIMENTAL_PLUGINS_CROWDSEC_MODULENAME: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      TRAEFIK_EXPERIMENTAL_PLUGINS_CROWDSEC_VERSION: ${VERSION_CROWDSEC_PLUGIN:-v1.6.0} # https://plugins.traefik.io/plugins/6335346ca4caa9ddeffda116/crowdsec-bouncer-traefik-plugin
    healthcheck:
      test: "traefik healthcheck --ping"
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 3
    network_mode: service:gerbil # Ports appear on the gerbil service

  ##############################################################################
  ##############################################################################
  ##############################################################################
  crowdsec:
    # https://hub.docker.com/r/crowdsecurity/crowdsec/tags
    image: crowdsecurity/crowdsec:${VERSION_CROWDSEC:-v1.7.8-debian}
    <<: *basic
    deploy:
      <<: *basic-deploy
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_CROWDSEC:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_CROWDSEC:-512m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_CROWDSEC:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_CROWDSEC:-32m}
    configs:
      - source: acquis_config
        target: /etc/crowdsec/acquis.yaml
        mode: 0440
        uid: "0"
        gid: "0"
      - source: appsec_config
        target: /etc/crowdsec/acquis.d/appsec.yaml
        mode: 0440
        uid: "0"
        gid: "0"
      - source: traefik_config
        target: /etc/crowdsec/acquis.d/traefik.yaml
        mode: 0440
        uid: "0"
        gid: "0"
      - source: syslog_config
        target: /etc/crowdsec/acquis.d/syslog.yaml
        mode: 0440
        uid: "0"
        gid: "0"
      - source: journalctl_config
        target: /etc/crowdsec/acquis.d/journalctl.yaml
        mode: 0440
        uid: "0"
        gid: "0"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - crowdsec_data:/etc/crowdsec
      - crowdsec_db:/var/lib/crowdsec/data
      # Syslog
      - traefik_logs:/var/log-traefik:ro
      - /var/log:/var/log:ro
    environment:
      CUSTOM_HOSTNAME: crowdsec
      BOUNCER_KEY_traefik: PANGOLINLAPI1234
      COLLECTIONS: crowdsecurity/traefik crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules crowdsecurity/linux crowdsecurity/iptables
      ENROLL_INSTANCE_NAME: pangolin-crowdsec
      ENROLL_TAGS: docker
      # GID: "1000"
      PARSERS: crowdsecurity/whitelists
    healthcheck:
      test: ["CMD", "cscli", "version"]
      # test: ["CMD", "cscli", "capi", "status"]
      start_period: 30s
      interval: 30s
      retries: 3
      timeout: 5s
    networks:
      proxy: {}

  ##############################################################################
  ##############################################################################
  ##############################################################################
  geoipupdate:
    # https://github.com/maxmind/geoipupdate/pkgs/container/geoipupdate
    image: ghcr.io/maxmind/geoipupdate:${VERSION_MAXMIND:-v7.1.1}
    <<: *basic
    deploy:
      <<: *basic-deploy
      resources:
        limits:
          cpus: ${RESOURCES_LIMITS_CPUS_GEOIPUPDATE:-1}
          memory: ${RESOURCES_LIMITS_MEMORY_GEOIPUPDATE:-64m}
        reservations:
          cpus: ${RESOURCES_RESERVATIONS_CPUS_GEOIPUPDATE:-0.001}
          memory: ${RESOURCES_RESERVATIONS_MEMORY_GEOIPUPDATE:-32m}
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - maxmind:${GEOIPUPDATE_DB_DIR:-/app/geo}
    secrets:
      - geoipupdate_account_id
      - geoipupdate_license_key
    environment:
      GEOIPUPDATE_ACCOUNT_ID_FILE: /run/secrets/geoipupdate_account_id
      GEOIPUPDATE_LICENSE_KEY_FILE: /run/secrets/geoipupdate_license_key
      GEOIPUPDATE_EDITION_IDS: ${GEOIPUPDATE_EDITION_IDS:-GeoLite2-Country GeoLite2-City GeoLite2-ASN}
      GEOIPUPDATE_FREQUENCY: ${GEOIPUPDATE_FREQUENCY:-72}
      GEOIPUPDATE_DB_DIR: ${GEOIPUPDATE_DB_DIR:-/app/geo}
    networks:
      proxy: {}

